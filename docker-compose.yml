services:
  db:
    image: postgres:16-alpine
    container_name: sos_venezuela_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: sos_venezuela
      POSTGRES_USER: sos_user
      POSTGRES_PASSWORD: sos_pass
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql

volumes:
  postgres_data:
